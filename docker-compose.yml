version: '3.8'

services:
  mongodb:
    image: mongo:6-jammy
    container_name: vuelos-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: vuelos
    volumes:
      - mongodb_data:/data/db
    networks:
      - vuelos-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vuelos-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongodb:27017/vuelos
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    networks:
      - vuelos-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vuelos-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - vuelos-net

volumes:
  mongodb_data:

networks:
  vuelos-net:
    driver: bridge